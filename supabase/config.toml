# Configuração das Edge Functions.
# O Send Email Hook é chamado pelo Supabase Auth SEM um JWT de usuário — a
# autenticidade é garantida pela assinatura do webhook (SEND_EMAIL_HOOK_SECRET).
# Por isso a verificação de JWT precisa ficar desabilitada nesta função.
[functions.auth-email-hook]
verify_jwt = false

# send-email é chamada por um Database Webhook (trigger), sem JWT de usuário —
# a autenticidade vem do segredo compartilhado (SEND_EMAIL_FN_SECRET).
[functions.send-email]
verify_jwt = false

# daily-backup é chamada pelo agendador (pg_cron/Supabase Cron), sem JWT de
# usuário — autenticidade via BACKUP_FN_SECRET. backup-download usa JWT do usuário.
[functions.daily-backup]
verify_jwt = false
